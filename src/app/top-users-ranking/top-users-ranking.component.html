<mat-list>
  @for (user of users; track user; let i = $index; let last = $last) {
    <mat-list-item>
      <div matLine>
        <span class="bold font-17 cyan-color-1" style="max-width: 90%; padding-left: 5px;">
          {{ user.name || user.firstName + " " + user.lastName }}
        </span>
        <span class="font-13 gray-600" style="margin-left: 2px;">
          {{ user.email }}
        </span>
      </div>
      <div matLine style="padding-left: 5px;">
        <span class="bold font-13 gray-700">{{ 'STATS.SCORE' | translate }}: {{ user.score }}</span>
      </div>
      @if (!last) {
        <mat-divider [inset]="true"></mat-divider>
      }
    </mat-list-item>
  }
</mat-list>
