<h1 mat-dialog-title>{{ 'DIALOG.SELECT_PARTICIPANT_IDEA' | translate }}</h1>
<mat-dialog-content>
  <mat-action-list>
    @for (node of data.nodes; track node) {
      <mat-list-item>
        @if (node.idea) {
          <button mat-list-item [mat-dialog-close]="node"> {{node.idea.title}} </button>
        }
        @if (!node.idea) {
          <button mat-list-item [mat-dialog-close]="node"> ({{ 'SYMBIO.EMPTY' | translate }}) </button>
        }
      </mat-list-item>
    }
  </mat-action-list>
</mat-dialog-content>

<mat-dialog-actions>
  <button mat-button mat-dialog-close>{{ 'COMMON.CANCEL' | translate }}</button>
</mat-dialog-actions>
